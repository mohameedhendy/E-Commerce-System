name: Security Scan

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filesystem-scan:
    name: Filesystem Security Scan

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Scan dependencies, secrets, and configuration
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          format: "table"
          skip-dirs: "target"

  container-scan:
    name: Container Security Scan

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build backend image
        run: |
          docker build \
            --tag ecommerce-backend:security-scan \
            .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "ecommerce-backend:security-scan"
          scanners: "vuln,secret,misconfig"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          format: "table"