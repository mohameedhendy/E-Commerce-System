services:
  database:
    image: postgres:17-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - ecommerce-network

  mailpit:
    image: axllent/mailpit:v1.30.4
    container_name: ecommerce-mailpit
    restart: unless-stopped

    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db

    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"

    expose:
      - "1025"

    volumes:
      - mailpit-data:/data

    networks:
      - ecommerce-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    image: ecommerce-backend:local
    container_name: ecommerce-backend
    restart: unless-stopped

    depends_on:
      database:
        condition: service_healthy
        restart: true

      mailpit:
        condition: service_started

    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-eCommerce}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ecommerce-api}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-3600}
      JWT_REFRESH_EXPIRY_SECONDS: ${JWT_REFRESH_EXPIRY_SECONDS:-2592000}
      JWT_VERIFICATION_EXPIRY_SECONDS: ${JWT_VERIFICATION_EXPIRY_SECONDS:-86400}
      JWT_PASSWORD_RESET_EXPIRY_SECONDS: ${JWT_PASSWORD_RESET_EXPIRY_SECONDS:-1800}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      EMAIL_VERIFICATION_ENABLED: ${EMAIL_VERIFICATION_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@ecommerce.local}

      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-10}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}

    ports:
      - "${BACKEND_PORT:-8080}:8080"

    stop_grace_period: 40s

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:8080/actuator/health/readiness > /dev/null"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

    networks:
      - ecommerce-network

volumes:
  postgres-data:
  mailpit-data:

networks:
  ecommerce-network:
    driver: bridge