spring.application.name=ecommerce-backend

# Database connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate
# Flyway manages schema changes, Hibernate only validates the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# Encryption configuration
encryption.salt.rounds=12

# JWT configuration
jwt.algorithm.key=test-jwt-secret-key-with-at-least-32-characters
jwt.issuer=${JWT_ISSUER:eCommerce}
jwt.verification-expiry-in-seconds=${JWT_VERIFICATION_EXPIRY_SECONDS:86400}
jwt.password-reset-expiry-in-seconds=${JWT_PASSWORD_RESET_EXPIRY_SECONDS:1800}

# Access token lifetime: 1 hour by default
jwt.expiry-in-seconds=${JWT_EXPIRY_SECONDS:3600}

# Refresh token lifetime: 30 days by default
jwt.refresh-expiry-in-seconds=${JWT_REFRESH_EXPIRY_SECONDS:2592000}

# Email configuration
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
email.from=${EMAIL_FROM:no-reply@ecommerce.com}

# General application configuration
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.email.verification.enabled=${EMAIL_VERIFICATION_ENABLED:false}

app.security.auth-rate-limit.enabled=${AUTH_RATE_LIMIT_ENABLED:true}
app.security.auth-rate-limit.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:10}
app.security.auth-rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}