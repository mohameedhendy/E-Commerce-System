spring.application.name=ecommerce-backend

# Database connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate
# Flyway manages schema changes, Hibernate only validates the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# Encryption configuration
encryption.salt.rounds=12

# JWT configuration
jwt.algorithm.key=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER:eCommerce}
jwt.audience=${JWT_AUDIENCE:ecommerce-api}
jwt.verification-expiry-in-seconds=${JWT_VERIFICATION_EXPIRY_SECONDS:86400}
jwt.password-reset-expiry-in-seconds=${JWT_PASSWORD_RESET_EXPIRY_SECONDS:1800}

# Access token lifetime: 1 hour by default
jwt.expiry-in-seconds=${JWT_EXPIRY_SECONDS:3600}

# Refresh token lifetime: 30 days by default
jwt.refresh-expiry-in-seconds=${JWT_REFRESH_EXPIRY_SECONDS:2592000}

# Email configuration
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
email.from=${EMAIL_FROM:no-reply@ecommerce.com}

# General application configuration
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.email.verification.enabled=${EMAIL_VERIFICATION_ENABLED:true}

app.security.auth-rate-limit.enabled=${AUTH_RATE_LIMIT_ENABLED:true}
app.security.auth-rate-limit.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:10}
app.security.auth-rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

# OpenAPI documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.display-request-duration=true
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

app.security.content-security-policy=default-src 'none'; frame-ancestors 'none'
app.security.swagger-content-security-policy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'
