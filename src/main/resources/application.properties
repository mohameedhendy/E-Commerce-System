spring.application.name=ecommerce-backend

# Trick to let IntelliJ view endpoints through actuator.
management.endpoints.jmx.exposure.include=*

# Database connection & configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Encryption configuration
encryption.salt.rounds=12

# JWT configuration
jwt.algorithm.key=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER:eCommerce}
jwt.expiryInSeconds=${JWT_EXPIRY_SECONDS:604800}

# Email configuration
email.from=no-reply@ecommerce.com

# General configuration
app.frontend.url=http://localhost:3000

# SMTP configuration
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp

mail.debug=true