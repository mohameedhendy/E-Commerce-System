# Database schema is managed only by Flyway
spring.jpa.hibernate.ddl-auto=validate

# Disable SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Support reverse proxies and HTTPS forwarding
server.forward-headers-strategy=framework

# Do not expose internal error details
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Keep health details private
management.endpoint.health.show-details=never

# API documentation is disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Swagger is disabled in production, so its routes keep the strict CSP
app.security.swagger-content-security-policy=default-src 'none'; frame-ancestors 'none'
# Email verification is secure by default in production
app.email.verification.enabled=${EMAIL_VERIFICATION_ENABLED:true}
