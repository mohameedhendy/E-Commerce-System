spring.application.name=ecommerce-backend-test
# H2 Test Database
spring.datasource.url=jdbc:h2:mem:ecommerce_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# Recreate database before tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# Encryption
encryption.salt.rounds=12
# JWT Test Configuration
jwt.algorithm.key=EcommerceTestSecretKeyForJUnitOnly123456789
jwt.issuer=eCommerce-test
jwt.expiry-in-seconds=604800
# GreenMail Test Server
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=springboot
spring.mail.password=secret
email.from=no-reply@ecommerce-test.com
app.email.verification.enabled=true
app.frontend.url=http://localhost:3000
# Tests currently create the H2 schema through Hibernate
spring.flyway.enabled=false