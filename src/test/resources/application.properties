spring.application.name=ecommerce-backend-test
# H2 Test Database
spring.datasource.url=jdbc:h2:mem:ecommerce_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# Recreate database before tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# Encryption
encryption.salt.rounds=12
# JWT Test Configuration
jwt.algorithm.key=EcommerceTestSecretKeyForJUnitOnly123456789
jwt.issuer=eCommerce-test
jwt.audience=ecommerce-api
jwt.expiry-in-seconds=604800
jwt.refresh-expiry-in-seconds=2592000
jwt.verification-expiry-in-seconds=86400
jwt.password-reset-expiry-in-seconds=1800
# GreenMail Test Server
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=springboot
spring.mail.password=secret
email.from=no-reply@ecommerce-test.com
app.email.verification.enabled=true
app.frontend.url=http://localhost:3000
# Tests currently create the H2 schema through Hibernate
spring.flyway.enabled=false
app.security.auth-rate-limit.enabled=true
app.security.auth-rate-limit.max-requests=10000
app.security.auth-rate-limit.window-seconds=60

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

app.security.content-security-policy=default-src 'none'; frame-ancestors 'none'
app.security.swagger-content-security-policy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'

# OpenAPI test configuration
springdoc.default-produces-media-type=application/json
